<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulkhead</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<style>
/* ═══════════════════════════════════════════════════════════════════
   BULKHEAD — Framework Shell
   Tab-specific CSS/JS lives in static/tabs/{id}.html
   ═══════════════════════════════════════════════════════════════════ */
:root {
  --bg:        #0d1117;
  --bg-card:   #161b22;
  --bg-hover:  #21262d;
  --border:    #30363d;
  --text:      #c9d1d9;
  --text-dim:  #8b949e;
  --cyan:      #58a6ff;
  --green:     #3fb950;
  --yellow:    #d2991d;
  --red:       #f85149;
  --magenta:   #bc8cff;
  --orange:    #f0883e;
  --seafoam:   #79c0ff;
  --accent:    #58a6ff;
  --radius:    8px;
  --font:      'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
  --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── Header ─────────────────────────────────────────────────────── */
.header {
  text-align: center;
  padding: 2rem 1rem 1rem;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-family: var(--font);
  font-size: 2rem;
  color: var(--cyan);
  letter-spacing: 1px;
}
.header p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.25rem;
}

/* ── Navbar ──────────────────────────────────────────────────────── */
.navbar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-group {
  display: flex;
  align-items: center;
}
.tab-btn, .nav-dropdown-toggle {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font-ui);
  font-size: 0.85rem;
  padding: 0.75rem 1rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn:hover, .nav-dropdown-toggle:hover { color: var(--text); background: var(--bg-hover); }
.tab-btn.active, .nav-dropdown-toggle.active { color: var(--cyan); border-bottom-color: var(--cyan); }

/* ── Dropdown ───────────────────────────────────────────────────── */
.nav-dropdown { position: relative; }
.nav-dropdown-toggle { padding-right: 0.4rem; }
.nav-dropdown-toggle::after {
  content: ' ▾';
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-left: 0.15rem;
}
.nav-dropdown-toggle.active::after { color: var(--cyan); }
.nav-dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 200px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  z-index: 101;
  padding: 0.35rem 0;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.nav-dropdown.open .nav-dropdown-menu { display: block; }
.nav-dropdown-menu .tab-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 0.55rem 1rem;
  border-bottom: none;
  font-size: 0.82rem;
}
.nav-dropdown-menu .tab-btn:hover { background: var(--bg-hover); }
.nav-dropdown-menu .tab-btn.active {
  color: var(--cyan);
  background: rgba(88,166,255,0.08);
  border-bottom: none;
}
.nav-dropdown-menu .dropdown-divider {
  height: 1px;
  background: var(--border);
  margin: 0.35rem 0.5rem;
}
.settings-btn {
  margin-left: auto;
  font-size: 1.1rem !important;
  padding: 0.5rem 0.75rem !important;
}

/* ── Mobile Nav ─────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .navbar { justify-content: flex-start; overflow-x: visible; flex-wrap: wrap; }
  .tab-btn, .nav-dropdown-toggle { font-size: 0.76rem; padding: 0.55rem 0.6rem; }
  .nav-dropdown { position: static; }
  .nav-dropdown-menu {
    position: fixed;
    top: auto;
    left: 0.5rem;
    right: 0.5rem;
    max-height: 60vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    z-index: 200;
  }
  .nav-dropdown.open .nav-dropdown-toggle { background: var(--bg-hover); }
}

/* ── Tab Content ───────────────────────────────────────────────── */
.tab-content { display: none; padding: 1.5rem; max-width: 960px; margin: 0 auto; }
.tab-content.active { display: block; }

/* ── Cards ──────────────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.card h3 {
  font-family: var(--font);
  font-size: 0.85rem;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.75rem;
}

/* ── Shared Result Display ─────────────────────────────────────── */
.result-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
.result-item:last-child { border-bottom: none; }
.result-label { font-size: 0.75rem; color: var(--text-dim); min-width: 90px; }
.result-value { font-family: var(--font); font-size: 1.2rem; color: var(--cyan); }
.result-value.cyan { color: var(--cyan); }

/* ── Shared Form Elements ──────────────────────────────────────── */
input[type="number"], select {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: var(--font); font-size: 0.9rem; padding: 0.5rem 0.75rem;
}
input[type="number"]:focus, select:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(88,166,255,0.15); }
.toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-hover); border-radius: 24px;
  transition: 0.2s; border: 1px solid var(--border);
}
.toggle-slider:before {
  content: ""; position: absolute;
  height: 18px; width: 18px;
  left: 2px; bottom: 2px;
  background: var(--text-dim); border-radius: 50%;
  transition: 0.2s;
}
.toggle-switch input:checked + .toggle-slider { background: var(--cyan); border-color: var(--cyan); }
.toggle-switch input:checked + .toggle-slider:before { background: #fff; transform: translateX(20px); }

/* ── Shared Unit Dropdowns ─────────────────────────────────────── */
.unit-row { display: flex; gap: 0.4rem; }
.unit-row input { flex: 1; }
.unit-row select {
  width: 68px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: var(--font);
  font-size: 0.8rem; padding: 0.4rem 0.3rem;
}
.unit-row select:focus { outline: none; border-color: var(--cyan); }

/* ── Button (shared) ────────────────────────────────────────────── */
.btn {
  background: var(--cyan); color: #fff; border: none; border-radius: var(--radius);
  padding: 0.5rem 1rem; font-family: var(--font-ui); font-size: 0.85rem;
  cursor: pointer; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }

/* ── Settings ──────────────────────────────────────────────────── */
.settings-section { margin-top: 1.5rem; }
.settings-section h4 { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 0.85rem; }
.tz-list { margin: 0.5rem 0; }
.tz-item { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
.tz-item:last-child { border-bottom: none; }
.tz-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1rem; }
.tz-remove:hover { color: var(--text); }
.tz-add-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center; }
.tz-add-row select { font-size: 0.8rem; padding: 0.35rem 0.5rem; }
.settings-save {
  background: var(--green); color: #fff; border: none; border-radius: var(--radius);
  padding: 0.6rem 2rem; font-family: var(--font-ui); font-size: 0.9rem;
  cursor: pointer; margin-top: 1rem; width: 100%;
}
.settings-save:hover { opacity: 0.9; }
.settings-btn { font-size: 1.2rem !important; padding: 0.5rem 0.75rem !important; }

/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .clock-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .clock-card { padding: 0.75rem; }
  .clock-time { font-size: 1.4rem; }
  .clock-seconds { font-size: 0.8rem; }
  .clock-bar-seg { width: 4px; height: 7px; }
  .overlap-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 420px) {
  .clock-grid { grid-template-columns: 1fr; }
  .clock-time { font-size: 1.25rem; }
  .clock-bar-seg { width: 3px; height: 6px; }
  .overlap-grid { grid-template-columns: 1fr; }
  .tab-content { padding: 0.75rem; }
  .result-value { font-size: 0.95rem !important; }
  .tline-result .value { font-size: 1rem !important; }
  .ohms-result-row .value { font-size: 0.9rem !important; }
  .freq-result .freq-value { font-size: 0.85rem !important; }
}

/* ── Scrollbar ──────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Loading indicator ──────────────────────────────────────────── */
.tab-loading {
  text-align: center; padding: 3rem; color: var(--text-dim);
  font-family: var(--font); font-size: 0.9rem;
}

</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────── -->
<div class="header">
  <img src="/static/logo.png" alt="Bulkhead" style="width:72px;height:72px;margin-bottom:0.25rem;filter:drop-shadow(0 0 8px rgba(88,166,255,0.3));">
  <p>Less bullshit, more hardware.</p>
</div>

<!-- ── Navbar (built dynamically from config) ──────────────────── -->
<nav class="navbar" id="navbar"></nav>

<!-- ── Tab Container (tabs injected here) ──────────────────────── -->
<div id="tab-container"></div>

<!-- ════════════════════════════════════════════════════════════════
     SETTINGS TAB (inline — tightly coupled with config)
     ════════════════════════════════════════════════════════════════ -->
<div class="tab-content" id="tab-settings">
  <div class="card">
    <h3>⚙️ Settings</h3>
    <div class="settings-section">
      <h4>Visible Tabs</h4>
      <div id="tab-toggles"></div>
    </div>
    <div class="settings-section">
      <h4>Timezones</h4>
      <div class="tz-list" id="tz-list"></div>
      <div class="tz-add-row">
        <select id="tz-preset-select">
          <option value="">+ Add timezone</option>
        </select>
      </div>
    </div>
    <button class="settings-save" onclick="saveSettings()">Save Settings</button>
    <div id="settings-saved" style="color:var(--green);font-size:0.8rem;margin-top:0.5rem;display:none;">✓ Saved</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// FRAMEWORK JS
// ═══════════════════════════════════════════════════════════════════

// ── Config ────────────────────────────────────────────────────────
let appConfig = {};
const ALL_TIMEZONES = [
  {city:"St. John's",tz:"America/St_Johns",label:"NDT"},
  {city:"Halifax",tz:"America/Halifax",label:"AT"},
  {city:"Collingwood",tz:"America/Toronto",label:"ET"},
  {city:"Vancouver",tz:"America/Vancouver",label:"PT"},
  {city:"Anchorage",tz:"America/Anchorage",label:"AKT"},
  {city:"Honolulu",tz:"Pacific/Honolulu",label:"HT"},
  {city:"UTC",tz:"UTC",label:"UTC"},
  {city:"London",tz:"Europe/London",label:"GMT"},
  {city:"Paris",tz:"Europe/Paris",label:"CET"},
  {city:"Tokyo",tz:"Asia/Tokyo",label:"JST"},
  {city:"Shanghai",tz:"Asia/Shanghai",label:"CST"},
  {city:"Singapore",tz:"Asia/Singapore",label:"SGT"},
  {city:"Sydney",tz:"Australia/Sydney",label:"AET"},
  {city:"Auckland",tz:"Pacific/Auckland",label:"NZST"},
  {city:"Dubai",tz:"Asia/Dubai",label:"GST"},
  {city:"Mumbai",tz:"Asia/Kolkata",label:"IST"},
  {city:"Moscow",tz:"Europe/Moscow",label:"MSK"},
];

async function loadConfig() {
  try {
    const resp = await fetch('/api/config');
    appConfig = await resp.json();
  } catch(e) {
    appConfig = { tabs: {}, timezones: ALL_TIMEZONES.slice(0,4), navigation: {} };
  }
}

// ── Navbar Builder ────────────────────────────────────────────────
function buildNavbar() {
  const nav = document.getElementById('navbar');
  const tabs = appConfig.tabs || {};
  const navCats = appConfig.navigation || {};

  // Group by nav category
  const groups = {};
  const directs = [];

  for (const [id, tab] of Object.entries(tabs)) {
    if (id === 'settings') continue;
    if (typeof tab === 'boolean') { if (tab) directs.push({id, label: id}); continue; }
    if (!tab.enabled) continue;
    if (tab.nav) {
      if (!groups[tab.nav]) groups[tab.nav] = [];
      groups[tab.nav].push({id, label: tab.label || id});
    } else {
      directs.push({id, label: tab.label || id});
    }
  }

  let html = '<div class="nav-group">';

  // Dropdowns
  for (const [cat, items] of Object.entries(groups)) {
    const catLabel = navCats[cat] || cat;
    html += `<div class="nav-dropdown">
      <button class="nav-dropdown-toggle">${catLabel} ▾</button>
      <div class="nav-dropdown-menu">`;
    for (const item of items) {
      html += `<button class="tab-btn" data-tab="${item.id}">${item.label}</button>`;
    }
    html += '</div></div>';
  }

  // Direct links
  for (const item of directs) {
    html += `<button class="tab-btn" data-tab="${item.id}">${item.label}</button>`;
  }

  html += '</div><button class="tab-btn settings-btn" data-tab="settings">⚙️</button>';
  nav.innerHTML = html;
  bindTabSwitching();
  bindDropdowns();
}

// ── Tab Switching ─────────────────────────────────────────────────
async function switchTab(tabId) {
  // Remove active from everything
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.nav-dropdown-toggle').forEach(t => t.classList.remove('active'));

  if (tabId === 'settings') {
    const btn = document.querySelector('.tab-btn[data-tab="settings"]');
    if (btn) btn.classList.add('active');
    const content = document.getElementById('tab-settings');
    if (content) content.classList.add('active');
    populateSettings();
    return;
  }

  // Load tab on demand (no-op if already loaded)
  await loadTab(tabId);

  // Highlight button
  const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
  if (btn) {
    btn.classList.add('active');
    const parent = btn.closest('.nav-dropdown');
    if (parent) {
      const toggle = parent.querySelector('.nav-dropdown-toggle');
      if (toggle) toggle.classList.add('active');
    }
  }

  // Show content
  const content = document.getElementById('tab-' + tabId);
  if (content) content.classList.add('active');
}

function bindTabSwitching() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (btn._bound) return;
    btn._bound = true;
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

// ── Dropdown Behavior ────────────────────────────────────────────
function bindDropdowns() {
  document.querySelectorAll('.nav-dropdown-toggle').forEach(toggle => {
    if (toggle._bound) return;
    toggle._bound = true;
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const dropdown = toggle.parentElement;
      const wasOpen = dropdown.classList.contains('open');
      document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
      if (!wasOpen) dropdown.classList.add('open');
    });
    toggle.addEventListener('touchend', (e) => {
      e.stopPropagation();
      e.preventDefault();
      const dropdown = toggle.parentElement;
      const wasOpen = dropdown.classList.contains('open');
      document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
      if (!wasOpen) dropdown.classList.add('open');
    });
  });
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.nav-dropdown')) {
    document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
  }
});
document.addEventListener('touchend', (e) => {
  if (!e.target.closest('.nav-dropdown')) {
    document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
  }
});

// ── Tab Loader (lazy — loads on first access) ────────────────────
const loadedTabs = new Set();

async function loadTab(id) {
  if (loadedTabs.has(id)) return;
  loadedTabs.add(id);

  const container = document.getElementById('tab-container');
  const tab = appConfig.tabs[id];
  if (!tab) return;

  if (tab.iframe) {
    const div = document.createElement('div');
    div.className = 'tab-content';
    div.id = 'tab-' + id;
    div.style.height = 'calc(100vh - 160px)';
    div.innerHTML = `<iframe src="${tab.iframe}" style="width:100%;height:100%;border:none;border-radius:8px;" loading="lazy"></iframe>`;
    container.appendChild(div);
  } else {
    // Show loading placeholder
    const placeholder = document.createElement('div');
    placeholder.className = 'tab-content';
    placeholder.id = 'tab-' + id;
    placeholder.innerHTML = '<div class="tab-loading">⏳ Loading ' + (tab.label || id) + '...</div>';
    container.appendChild(placeholder);

    try {
      const resp = await fetch('/static/tabs/' + id + '.html');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const html = await resp.text();
      placeholder.remove();
      injectTab(container, html);
    } catch(e) {
      console.error('Failed to load tab ' + id + ':', e);
      placeholder.innerHTML = '<div class="tab-loading">⚠ Failed to load ' + (tab.label || id) + '</div>';
    }
  }
}

function injectTab(container, html) {
  const temp = document.createElement('div');
  temp.innerHTML = html;

  // Inject styles into head
  temp.querySelectorAll('style').forEach(s => {
    document.head.appendChild(s.cloneNode(true));
  });

  // Inject tab-content div
  const tabDiv = temp.querySelector('.tab-content');
  if (tabDiv) {
    container.appendChild(tabDiv.cloneNode(true));
  }

  // Execute scripts
  temp.querySelectorAll('script').forEach(s => {
    const ns = document.createElement('script');
    ns.textContent = s.textContent;
    document.body.appendChild(ns);
  });
}

// ── Settings Tab ─────────────────────────────────────────────────
function populateSettings() {
  const togglesDiv = document.getElementById('tab-toggles');
  if (!togglesDiv) return;

  const tabs = appConfig.tabs || {};
  const entries = Object.entries(tabs).filter(([id]) => id !== 'settings');

  togglesDiv.innerHTML = entries.map(([id, tab]) => {
    const label = (typeof tab === 'object' && tab.label) ? tab.label : id;
    const enabled = (typeof tab === 'object') ? (tab.enabled !== false) : !!tab;
    return `<div class="toggle-row">
      <span class="toggle-label">${label}</span>
      <label class="toggle-switch">
        <input type="checkbox" data-tab="${id}" ${enabled ? 'checked' : ''} onchange="toggleTabPreview(this)">
        <span class="toggle-slider"></span>
      </label>
    </div>`;
  }).join('');

  // Timezone list
  const tzList = document.getElementById('tz-list');
  const timezones = appConfig.timezones || ALL_TIMEZONES.slice(0, 4);
  tzList.innerHTML = timezones.map((t, i) => `
    <div class="tz-item">
      <span>${t.city} <span style="color:var(--text-dim)">${t.label}</span></span>
      <button class="tz-remove" onclick="removeTimezone(${i})" title="Remove">✕</button>
    </div>
  `).join('');

  // Timezone preset dropdown
  const sel = document.getElementById('tz-preset-select');
  sel.innerHTML = '<option value="">+ Add timezone</option>' +
    ALL_TIMEZONES.map(t => `<option value="${t.tz}">${t.city} (${t.label})</option>`).join('');
  sel.onchange = function() {
    if (!this.value) return;
    const tz = ALL_TIMEZONES.find(t => t.tz === this.value);
    if (tz) {
      appConfig.timezones = [...(appConfig.timezones || []), tz];
      populateSettings();
    }
    this.value = '';
  };
}

function toggleTabPreview(cb) {
  const tabId = cb.dataset.tab;
  const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
  if (btn) btn.style.display = cb.checked ? '' : 'none';
}

function removeTimezone(idx) {
  appConfig.timezones.splice(idx, 1);
  if (appConfig.timezones.length === 0) {
    appConfig.timezones = [ALL_TIMEZONES[0]];
  }
  populateSettings();
}

async function saveSettings() {
  const tabs = {};
  document.querySelectorAll('#tab-toggles input[type="checkbox"]').forEach(cb => {
    tabs[cb.dataset.tab] = cb.checked;
  });

  try {
    const resp = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({tabs, timezones: appConfig.timezones})
    });
    if (resp.ok) {
      appConfig = await resp.json();
      const saved = document.getElementById('settings-saved');
      saved.style.display = 'block';
      setTimeout(() => saved.style.display = 'none', 2000);
      applyConfig();
    }
  } catch(e) {
    console.error('Save failed:', e);
  }
}

function applyConfig() {
  if (!appConfig) return;
  const cfg = appConfig.tabs || {};
  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    const tab = btn.dataset.tab;
    if (tab === 'settings') return;
    const t = cfg[tab];
    const enabled = (typeof t === 'object') ? (t.enabled !== false) : !!t;
    btn.style.display = enabled ? '' : 'none';
  });
}

const E12 = [1.0,1.2,1.5,1.8,2.2,2.7,3.3,3.9,4.7,5.6,6.8,8.2];

// ── Shared Helpers ────────────────────────────────────────────────
function fmtR(v) {
  if (v >= 1e6) return (v/1e6).toFixed(2) + ' MΩ';
  if (v >= 1000) return (v/1000).toFixed(2) + ' kΩ';
  return v.toFixed(2) + ' Ω';
}

function fmtTime(s) {
  if (s >= 1) return s.toFixed(2) + ' s';
  if (s >= 0.001) return (s*1000).toFixed(2) + ' ms';
  if (s >= 0.000001) return (s*1e6).toFixed(2) + ' µs';
  return (s*1e9).toFixed(2) + ' ns';
}

function fmtFreq(hz) {
  if (hz >= 1e9) return (hz/1e9).toFixed(2) + ' GHz';
  if (hz >= 1e6) return (hz/1e6).toFixed(2) + ' MHz';
  if (hz >= 1e3) return (hz/1e3).toFixed(2) + ' kHz';
  return hz.toFixed(2) + ' Hz';
}

function nearestE12(v) {
  if (v <= 0) return '—';
  const decade = Math.pow(10, Math.floor(Math.log10(v)));
  const norm = v / decade;
  let best = E12[0];
  for (const e of E12) { if (Math.abs(norm - e) < Math.abs(norm - best)) best = e; }
  return fmtR(best * decade);
}
