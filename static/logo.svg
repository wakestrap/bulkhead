<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="gaugeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#1a7f2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="90" cy="90" r="85" fill="url(#gaugeBg)" stroke="#30363d" stroke-width="2"/>
  <circle cx="90" cy="90" r="78" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Tick marks around the gauge -->
  <g stroke="#8b949e" stroke-width="1.5">
    <!-- Major ticks every 30° -->
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(0,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(30,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(60,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(90,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(120,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(150,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(180,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(210,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(240,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(270,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(300,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="22" transform="rotate(330,90,90)"/>
  </g>
  <!-- Minor ticks every 10° -->
  <g stroke="#30363d" stroke-width="0.8">
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(10,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(20,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(40,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(50,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(70,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(80,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(100,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(110,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(130,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(140,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(160,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(170,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(190,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(200,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(220,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(230,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(250,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(260,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(280,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(290,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(310,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(320,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(340,90,90)"/>
    <line x1="90" y1="12" x2="90" y2="18" transform="rotate(350,90,90)"/>
  </g>

  <!-- Danger zone arc (red segment on outer ring) -->
  <path d="M 15 55 A 85 85 0 0 1 55 15" fill="none" stroke="#f85149" stroke-width="3" opacity="0.6" filter="url(#glow)"/>

  <!-- Wave motif at bottom of gauge -->
  <g transform="translate(90,95)" filter="url(#shadow)">
    <path d="M-35,0 C-25,-12 -15,-12 -5,0 C5,12 15,12 25,0 C35,-12 45,-12 55,0" 
          fill="none" stroke="url(#waveGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M-30,8 C-20,-4 -10,-4 0,8 C10,20 20,20 30,8 C40,-4 50,-4 60,8" 
          fill="none" stroke="url(#waveGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M-25,16 C-15,4 -5,4 5,16 C15,28 25,28 35,16" 
          fill="none" stroke="url(#waveGrad)" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Needle -->
  <g filter="url(#glow)">
    <line x1="90" y1="90" x2="52" y2="38" stroke="url(#needleGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Needle pivot -->
    <circle cx="90" cy="90" r="5" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="90" cy="90" r="2" fill="#58a6ff"/>
  </g>

  <!-- Center monogram -->
  <text x="90" y="148" text-anchor="middle" font-family="'SF Mono','Consolas',monospace" 
        font-size="14" font-weight="bold" fill="#58a6ff" letter-spacing="3">AP</text>

  <!-- Scale labels -->
  <text x="90" y="8" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">0</text>
  <text x="148" y="50" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">3</text>
  <text x="155" y="94" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">6</text>
  <text x="148" y="138" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">9</text>
  <text x="90" y="172" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">12</text>
  <text x="32" y="138" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">15</text>
  <text x="25" y="94" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">18</text>
  <text x="32" y="50" text-anchor="middle" font-family="monospace" font-size="6" fill="#8b949e" opacity="0.5">21</text>

  <!-- Thin outer accent -->
  <circle cx="90" cy="90" r="88" fill="none" stroke="#58a6ff" stroke-width="0.5" opacity="0.3"/>
</svg>
