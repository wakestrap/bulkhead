<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wire Gauge Calculator</title>
<style>
:root {
  --bg:        #0d1117;
  --bg-card:   #161b22;
  --bg-hover:  #21262d;
  --border:    #30363d;
  --text:      #c9d1d9;
  --text-dim:  #8b949e;
  --cyan:      #58a6ff;
  --green:     #3fb950;
  --yellow:    #d2991d;
  --red:       #f85149;
  --magenta:   #bc8cff;
  --orange:    #f0883e;
  --radius:    8px;
  --font:      'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
  --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  padding: 1.5rem;
  min-height: 100vh;
  overflow-y: auto;
}
h1 {
  font-family: var(--font);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--cyan);
  margin-bottom: 1.25rem;
  letter-spacing: -0.02em;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
  max-width: 520px;
}
label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.35rem;
  font-weight: 600;
}

/* ── Mode Toggle ── */
.mode-toggle {
  display: flex;
  gap: 0;
  margin-bottom: 1.25rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  width: fit-content;
}
.mode-btn {
  background: var(--bg);
  color: var(--text-dim);
  border: none;
  padding: 0.45rem 1.1rem;
  font-size: 0.82rem;
  font-family: var(--font-ui);
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}
.mode-btn:first-child { border-right: 1px solid var(--border); }
.mode-btn.active {
  background: var(--cyan);
  color: #fff;
  font-weight: 600;
}
.mode-btn:hover:not(.active) {
  color: var(--text);
  background: var(--bg-hover);
}

/* ── Conductor Rows ── */
.conductors { margin-bottom: 0.75rem; }
.row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.row-label {
  font-family: var(--font);
  font-size: 0.78rem;
  color: var(--text-dim);
  min-width: 90px;
  white-space: nowrap;
}
.row select, .row input[type="number"] {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.45rem 0.6rem;
  font-size: 0.88rem;
  font-family: var(--font);
  flex: 1;
  max-width: 120px;
  outline: none;
  transition: border-color 0.15s;
}
.row select:focus, .row input:focus {
  border-color: var(--cyan);
}
.row .count-input {
  max-width: 64px;
  text-align: center;
  background: var(--bg);
}
.row .gauge-input {
  max-width: 100px;
}
.remove-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0.25rem 0.4rem;
  border-radius: 6px;
  line-height: 1;
  transition: all 0.15s;
  visibility: hidden;
}
.row:hover .remove-btn.show { visibility: visible; }
.remove-btn:hover {
  color: var(--red);
  background: rgba(248,81,73,0.1);
  border-color: rgba(248,81,73,0.3);
}

/* ── Add Button ── */
.add-btn {
  background: var(--bg-hover);
  color: var(--cyan);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 0.5rem 1rem;
  font-size: 0.82rem;
  font-family: var(--font-ui);
  cursor: pointer;
  margin-bottom: 1rem;
  transition: all 0.15s;
  font-weight: 500;
}
.add-btn:hover {
  border-color: var(--cyan);
  background: rgba(88,166,255,0.08);
}

/* ── Results ── */
.results {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-top: 0.25rem;
}
.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}
.result-item {
  text-align: center;
}
.result-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.2rem;
  font-weight: 600;
}
.result-value {
  font-family: var(--font);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--green);
}
.result-value.frac {
  font-size: 1.15rem;
  color: var(--yellow);
}
.result-derive {
  margin-top: 0.75rem;
  padding-top: 0.6rem;
  border-top: 1px solid var(--border);
  font-family: var(--font);
  font-size: 0.75rem;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  body { padding: 0.75rem; }
  .card { padding: 0.85rem; }
  .result-value { font-size: 1.25rem; }
}
</style>
</head>
<body>

<h1>🧮 Wire Gauge Combination Calculator</h1>

<div class="card">
  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="awg">AWG</button>
    <button class="mode-btn" data-mode="metric">Metric (mm²)</button>
  </div>

  <!-- Conductor List -->
  <div class="conductors" id="conductors"></div>

  <button class="add-btn" id="addBtn">+ Add Conductor</button>

  <!-- Results -->
  <div class="results" id="results">
    <p style="color:var(--text-dim);font-style:italic;text-align:center;">Enter gauges to calculate combined equivalent</p>
  </div>
</div>

<script>
// ── AWG Data ──
const AWG_SIZES = [
  { n: "0000", label: "0000 (4/0)" },
  { n: "000",  label: "000 (3/0)" },
  { n: "00",   label: "00 (2/0)" },
  { n: "0",    label: "0 (1/0)" },
  ...Array.from({length:41}, (_,i) => ({ n: String(i), label: `${i} AWG` }))
];

// AWG area in mm²
function awgArea(awg) {
  const d = 0.127 * Math.pow(92, (36 - awg) / 39);
  return (Math.PI / 4) * d * d;
}

// mm² to effective AWG (fractional)
function areaToAwg(area) {
  if (area <= 0) return NaN;
  const d = 2 * Math.sqrt(area / Math.PI);
  return 36 - (39 * Math.log(d / 0.127) / Math.log(92));
}

// AWG name (e.g., 17.3 → "~17 AWG", -2.1 → "~00 AWG")
function awgName(n) {
  if (isNaN(n)) return "—";
  const r = Math.round(n * 2) / 2; // round to nearest 0.5
  if (r >= 1) return `${r} AWG`;
  if (r >= 0) return "0 (1/0)";
  if (r >= -1) return "00 (2/0)";
  if (r >= -2) return "000 (3/0)";
  if (r >= -3) return "0000 (4/0)";
  return `${r} AWG`;
}

// ── State ──
let mode = 'awg';
let conductors = [
  { gauge: '20', count: 1 },
  { gauge: '20', count: 1 }
];

// ── Render ──
function renderConductors() {
  const container = document.getElementById('conductors');
  container.innerHTML = conductors.map((c, i) => {
    const showRemove = conductors.length > 2;
    const gaugeInput = mode === 'awg'
      ? `<select class="gauge-input" data-idx="${i}" data-field="gauge">
           ${AWG_SIZES.map(s => `<option value="${s.n}" ${c.gauge === s.n ? 'selected' : ''}>${s.label}</option>`).join('')}
         </select>`
      : `<div style="display:flex;align-items:center;gap:0.25rem;flex:1;max-width:160px;">
           <input type="number" class="gauge-input" data-idx="${i}" data-field="gauge"
                  value="${c.gauge}" step="0.01" min="0.001" placeholder="mm²"
                  style="max-width:100px;">
           <span style="font-size:0.78rem;color:var(--text-dim);">mm²</span>
         </div>`;
    return `<div class="row">
      <span class="row-label">Conductor ${i + 1}</span>
      <input type="number" class="count-input" data-idx="${i}" data-field="count"
             value="${c.count}" min="1" max="999" step="1" title="Count">
      <span style="font-size:0.78rem;color:var(--text-dim);margin-right:0.25rem;">×</span>
      ${gaugeInput}
      <button class="remove-btn ${showRemove ? 'show' : ''}" data-idx="${i}" title="Remove">✕</button>
    </div>`;
  }).join('');
}

function renderResults() {
  const el = document.getElementById('results');
  let totalArea = 0;
  let allValid = true;

  for (const c of conductors) {
    const count = parseInt(c.count) || 0;
    if (count <= 0) { allValid = false; continue; }
    let area;
    if (mode === 'awg') {
      const awg = parseFloat(c.gauge);
      if (isNaN(awg)) { allValid = false; continue; }
      area = awgArea(awg);
    } else {
      area = parseFloat(c.gauge);
      if (isNaN(area) || area <= 0) { allValid = false; continue; }
    }
    totalArea += count * area;
  }

  if (!allValid || conductors.length < 2 || totalArea <= 0) {
    el.innerHTML = '<p style="color:var(--text-dim);font-style:italic;text-align:center;">Enter at least 2 conductors to calculate</p>';
    return;
  }

  const effAwg = areaToAwg(totalArea);
  const effAwgRounded = Math.round(effAwg * 2) / 2;
  const effDia = 2 * Math.sqrt(totalArea / Math.PI);

  // Summary line
  const parts = conductors.map(c => `${c.count}×${mode==='awg' ? c.gauge+'AWG' : c.gauge+'mm²'}`);
  const summary = parts.join(' + ');

  el.innerHTML = `
    <div class="result-grid">
      <div class="result-item">
        <div class="result-label">Combined Equivalent</div>
        <div class="result-value">${awgName(effAwg)}</div>
      </div>
      <div class="result-item">
        <div class="result-label">Total Area</div>
        <div class="result-value">${totalArea.toFixed(3)} mm²</div>
      </div>
    </div>
    <div class="result-derive">
      ${summary}<br>
      Total cross-section: ${totalArea.toFixed(4)} mm² → Ø ${effDia.toFixed(3)} mm → ${awgName(effAwg)}
      ${effAwgRounded !== Math.round(effAwg) ? ` (closest half-gauge: ${awgName(effAwgRounded)})` : ''}
    </div>
  `;
}

function recalc() {
  renderConductors();
  renderResults();
}

// ── Event Delegation ──
document.getElementById('conductors').addEventListener('change', e => {
  const el = e.target;
  const idx = parseInt(el.dataset.idx);
  const field = el.dataset.field;
  if (isNaN(idx) || !field) return;
  conductors[idx][field] = el.value;
  recalc();
});
document.getElementById('conductors').addEventListener('click', e => {
  if (e.target.classList.contains('remove-btn')) {
    const idx = parseInt(e.target.dataset.idx);
    if (!isNaN(idx) && conductors.length > 2) {
      conductors.splice(idx, 1);
      recalc();
    }
  }
});

document.getElementById('addBtn').addEventListener('click', () => {
  conductors.push({ gauge: mode === 'awg' ? '20' : '1.0', count: 1 });
  recalc();
});

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const newMode = btn.dataset.mode;
    if (newMode !== mode) {
      mode = newMode;
      // Convert gauge values
      conductors = conductors.map(c => {
        if (mode === 'awg') {
          const area = parseFloat(c.gauge);
          if (!isNaN(area) && area > 0) return { ...c, gauge: String(Math.round(areaToAwg(area))) };
          return { ...c, gauge: '20' };
        } else {
          const awg = parseFloat(c.gauge);
          if (!isNaN(awg)) return { ...c, gauge: awgArea(awg).toFixed(3) };
          return { ...c, gauge: '0.5' };
        }
      });
      recalc();
    }
  });
});

// Init
recalc();
</script>

</body>
</html>
