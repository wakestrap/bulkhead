<style>
/* ── dB Converter ───────────────────────────────────────────────── */
.db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.db-section-title {
  font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
  font-weight: 600; margin-bottom: 0.5rem; letter-spacing: 0.3px;
}
.db-field { margin-bottom: 0.75rem; }
.db-field label {
  display: block; font-size: 0.7rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  margin-bottom: 0.2rem;
}
.db-field input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: var(--font);
  font-size: 0.95rem; padding: 0.5rem 0.75rem;
}
.db-field input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(88,166,255,0.12); }
.db-impedance-row {
  display: flex; gap: 0.4rem; align-items: center; margin-top: 0.25rem;
}
.db-impedance-row select {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-family: var(--font); font-size: 0.85rem; padding: 0.45rem;
  width: 80px;
}
.db-impedance-row select:focus { outline: none; border-color: var(--cyan); }
.db-impedance-row span { font-size: 0.75rem; color: var(--text-dim); }

.db-cascade-wrap { margin-top: 1rem; }
.db-cascade-inputs {
  display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.35rem;
}
.db-cascade-inputs input {
  width: 64px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-family: var(--font);
  font-size: 0.85rem; padding: 0.35rem 0.5rem; text-align: center;
}
.db-cascade-inputs input:focus { outline: none; border-color: var(--cyan); }
.db-cascade-btn {
  background: var(--bg); border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 4px; padding: 0.3rem 0.6rem; font-size: 0.72rem;
  cursor: pointer; margin-top: 0.3rem; font-family: var(--font-ui);
}
.db-cascade-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.db-cascade-result {
  font-family: var(--font); font-size: 0.9rem; color: var(--cyan); margin-top: 0.5rem;
}

@media (max-width: 700px) {
  .db-grid { grid-template-columns: 1fr; gap: 1rem; }
}
@media (max-width: 420px) {
  .db-field input { font-size: 0.85rem; padding: 0.4rem 0.6rem; }
  .db-cascade-inputs { gap: 0.25rem; }
  .db-cascade-inputs input { width: 56px; font-size: 0.8rem; padding: 0.3rem 0.4rem; }
  .db-cascade-result { font-size: 0.8rem; }
}
</style>

<div class="tab-content" id="tab-db">
  <div class="card">
    <h3>📶 dB / dBm / Ratio</h3>

    <div class="db-grid">
      <!-- dBm ↔ Watts ↔ Volts -->
      <div>
        <div class="db-section-title">dBm ↔ Watts ↔ Volts</div>
        <div class="db-field">
          <label>dBm</label>
          <input type="number" id="db-dbm" step="any" placeholder="dBm" oninput="calcDB_from('dbm')">
        </div>
        <div class="db-field">
          <label>Power (W)</label>
          <input type="number" id="db-watts" step="any" placeholder="Watts" oninput="calcDB_from('watts')">
        </div>
        <div class="db-field">
          <label>Voltage</label>
          <input type="number" id="db-volts" step="any" placeholder="Volts" oninput="calcDB_from('volts')">
        </div>
        <div class="db-impedance-row">
          <select id="db-impedance" onchange="calcDB_from('impedance')">
            <option value="50" selected>50 Ω</option>
            <option value="75">75 Ω</option>
            <option value="600">600 Ω</option>
          </select>
          <span>Reference impedance</span>
        </div>
      </div>

      <!-- dB ↔ Ratio + Cascade -->
      <div>
        <div class="db-section-title">dB ↔ Ratio</div>
        <div class="db-field">
          <label>dB</label>
          <input type="number" id="db-ratio-db" step="any" placeholder="dB" oninput="calcDBRatio_from('db')">
        </div>
        <div class="db-field">
          <label>Power Ratio</label>
          <input type="number" id="db-ratio-power" step="any" placeholder="× multiplier" oninput="calcDBRatio_from('power')">
        </div>
        <div class="db-field">
          <label>Voltage Ratio</label>
          <input type="number" id="db-ratio-volt" step="any" placeholder="× multiplier" oninput="calcDBRatio_from('volt')">
        </div>

        <div class="db-cascade-wrap">
          <div class="db-section-title">Cascaded Gain</div>
          <div class="db-cascade-inputs" id="db-cascade-inputs">
            <input type="number" value="3" step="any" placeholder="dB" oninput="calcDBCascade()">
            <input type="number" value="-1" step="any" placeholder="dB" oninput="calcDBCascade()">
            <input type="number" value="20" step="any" placeholder="dB" oninput="calcDBCascade()">
          </div>
          <button class="db-cascade-btn" onclick="addDBCascadeStage()">+ Add Stage</button>
          <div class="db-cascade-result" id="db-cascade-result">Total: 22 dB (158.5× power)</div>
        </div>
      </div>
    </div>
  </div>
</div>


<script>
// ── dB/dBm Converter ──────────────────────────────────────────────

function calcDB_from(src) {
  const z = parseFloat(document.getElementById('db-impedance').value) || 50;
  const dbmEl = document.getElementById('db-dbm');
  const wattsEl = document.getElementById('db-watts');
  const voltsEl = document.getElementById('db-volts');

  let dbm, watts, volts;

  if (src === 'dbm' && dbmEl.value !== '') {
    dbm = parseFloat(dbmEl.value);
    watts = Math.pow(10, (dbm - 30) / 10);
    volts = Math.sqrt(watts * z);
  } else if (src === 'watts' && wattsEl.value !== '') {
    watts = parseFloat(wattsEl.value);
    dbm = 10 * Math.log10(watts) + 30;
    volts = Math.sqrt(watts * z);
  } else if (src === 'volts' && voltsEl.value !== '') {
    volts = parseFloat(voltsEl.value);
    watts = volts * volts / z;
    dbm = 10 * Math.log10(watts) + 30;
  } else {
    return;
  }

  if (isFinite(dbm)) dbmEl.value = dbm.toFixed(2);
  if (isFinite(watts)) {
    if (watts >= 1) wattsEl.value = watts.toFixed(4);
    else if (watts >= 0.001) wattsEl.value = (watts*1000).toFixed(3);
    else wattsEl.value = watts.toExponential(3);
  }
  if (isFinite(volts)) {
    if (volts >= 1) voltsEl.value = volts.toFixed(3);
    else if (volts >= 0.001) voltsEl.value = (volts*1000).toFixed(2);
    else voltsEl.value = volts.toExponential(3);
  }
}

function calcDBRatio_from(src) {
  const dbEl = document.getElementById('db-ratio-db');
  const powerEl = document.getElementById('db-ratio-power');
  const voltEl = document.getElementById('db-ratio-volt');

  let db, pr, vr;

  if (src === 'db' && dbEl.value !== '') {
    db = parseFloat(dbEl.value);
    pr = Math.pow(10, db/10);
    vr = Math.pow(10, db/20);
  } else if (src === 'power' && powerEl.value !== '') {
    pr = parseFloat(powerEl.value);
    db = 10 * Math.log10(pr);
    vr = Math.sqrt(pr);
  } else if (src === 'volt' && voltEl.value !== '') {
    vr = parseFloat(voltEl.value);
    db = 20 * Math.log10(vr);
    pr = vr * vr;
  } else {
    return;
  }

  if (isFinite(db)) dbEl.value = db.toFixed(2);
  if (isFinite(pr)) powerEl.value = pr.toFixed(4);
  if (isFinite(vr)) voltEl.value = vr.toFixed(4);
}

function calcDBCascade() {
  const inputs = document.querySelectorAll('#db-cascade-inputs input');
  let totalDB = 0;
  inputs.forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v)) totalDB += v;
  });
  const totalRatio = Math.pow(10, totalDB/10);
  document.getElementById('db-cascade-result').textContent =
    `Total: ${totalDB.toFixed(1)} dB (${totalRatio >= 1000 ? totalRatio.toExponential(2) : totalRatio.toFixed(1)}× power)`;
}

function addDBCascadeStage() {
  const container = document.getElementById('db-cascade-inputs');
  const inp = document.createElement('input');
  inp.type = 'number'; inp.value = '0'; inp.step = 'any';
  inp.placeholder = 'dB';
  inp.addEventListener('input', calcDBCascade);
  container.appendChild(inp);
}

calcDBCascade();

</script>
