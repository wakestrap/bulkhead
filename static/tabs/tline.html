<style>
/* ── T-Line Impedance ──────────────────────────────────────────── */
.tline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.tline-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.tline-input-group { display: flex; flex-direction: column; gap: 0.25rem; }
.tline-input-group label {
  font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 600;
}
.tline-input-group input, .tline-input-group select {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: var(--font); font-size: 0.9rem; padding: 0.5rem 0.75rem;
}
.tline-input-group input:focus, .tline-input-group select:focus {
  outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
}
.tline-results {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1rem;
}
.tline-result {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0.75rem;
}
.tline-result .label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
.tline-result .value { font-family: var(--font); font-size: 1.3rem; color: var(--cyan); margin-top: 0.2rem; }
.tline-result .unit { font-size: 0.65rem; color: var(--text-dim); }
.tline-diagram {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem;
  display: flex; align-items: center; justify-content: center;
  min-height: 300px;
}
.tline-presets {
  display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.35rem;
}
.tline-preset {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-dim); font-size: 0.7rem; padding: 0.25rem 0.5rem;
  cursor: pointer; transition: all 0.15s; font-family: var(--font-ui);
}
.tline-preset:hover { border-color: var(--cyan); color: var(--cyan); }
.tline-preset.active { border-color: var(--cyan); color: var(--cyan); background: rgba(88,166,255,0.1); }
.tline-structure-tabs {
  display: flex; gap: 0; margin-bottom: 1rem;
}
.tline-structure-btn {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.8rem; padding: 0.45rem 1rem;
  cursor: pointer; transition: all 0.15s; font-family: var(--font-ui);
}
.tline-structure-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.tline-structure-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.tline-structure-btn:not(:first-child) { border-left: none; }
.tline-structure-btn.active { background: var(--cyan); color: #fff; border-color: var(--cyan); }
.tline-impulse { display: flex; gap: 0.5rem; align-items: center; }
.tline-impulse .badge {
  padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700;
  font-family: var(--font); letter-spacing: 0.5px;
}
.tline-impulse .badge.good { background: rgba(63,185,80,0.15); color: var(--green); }
.tline-impulse .badge.warn { background: rgba(210,153,29,0.15); color: var(--yellow); }
.tline-impulse .badge.bad { background: rgba(248,81,73,0.15); color: var(--red); }

@media (max-width: 600px) {
  .tline-grid { grid-template-columns: 1fr; }
  .tline-inputs { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 420px) {
  .tline-inputs { grid-template-columns: 1fr; }
  .tline-results { grid-template-columns: 1fr; }
}

</style>

<script>
// ── T-Line Impedance Calculator ──────────────────────────────────

let tlineStructure = 'microstrip';
let tlineDifferential = false;
let tlineTargetZ = 50;

function setTLineStructure(type) {
  tlineStructure = type;
  document.querySelectorAll('.tline-structure-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.tline-structure-btn[data-type="${type}"]`);
  if (btn) btn.classList.add('active');
  calcTLine();
}

function toggleDifferential() {
  tlineDifferential = document.getElementById('tline-diff-toggle').checked;
  document.getElementById('tline-s-group').style.display = tlineDifferential ? 'flex' : 'none';
  calcTLine();
}

function setTLineTarget(z) {
  tlineTargetZ = z;
  document.querySelectorAll('.tline-preset[data-z]').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.tline-preset[data-z="${z}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('tline-target').value = z;
  calcTLine();
}

function applyTLinePreset(er) {
  document.getElementById('tline-er').value = er;
  document.querySelectorAll('.tline-preset[data-er]').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.er) === er);
  });
  calcTLine();
}

// Wheeler microstrip (IPC-2141A) with thickness correction
function calcMicrostrip(er, w, h, t) {
  let we = w;
  if (t > 0) {
    if (w/h < 0.159) {
      we = w + t/Math.PI * (1 + Math.log(2*h/t));
    } else {
      we = w + t/Math.PI * (1 + Math.log(4*Math.PI*w/t));
    }
  }
  we = Math.max(we, 0.001);
  const ratio = we / h;
  let eeff, z0;
  if (ratio <= 1) {
    eeff = (er+1)/2 + (er-1)/2 * (Math.pow(1+12/ratio, -0.5) + 0.04*Math.pow(1-ratio, 2));
    z0 = 60/Math.sqrt(eeff) * Math.log(8/ratio + ratio/4);
  } else {
    eeff = (er+1)/2 + (er-1)/2 * Math.pow(1+12/ratio, -0.5);
    z0 = 120*Math.PI/Math.sqrt(eeff) / (ratio + 1.393 + 0.667*Math.log(ratio+1.444));
  }
  return { z0, eeff };
}

// Symmetric stripline (IPC-2141A)
function calcStripline(er, w, h, t) {
  const z0 = 60/Math.sqrt(er) * Math.log(1.9*(2*h)/(0.8*w + t));
  return { z0, eeff: er };
}

// Differential microstrip approximation
function calcDiffMicrostrip(z0, s, h) {
  const factor = 1 - 0.48*Math.exp(-0.96*s/h);
  const zdiff = 2*z0*factor;
  const zodd = zdiff/2;
  const zeven = 2*z0 - zodd;
  return { zdiff, zodd, zeven };
}

function drawTLineDiagram(w, h, t, s) {
  const svg = document.getElementById('tline-diagram-svg');
  if (!svg) return;
  const W = 360, H = 280;
  const margin = { top: 30, right: 20, bottom: 40, left: 20 };
  const plotW = W - margin.left - margin.right;
  const plotH = H - margin.top - margin.bottom;
  const maxDim = Math.max(w, h, t*10);
  const scale = plotW * 0.75 / maxDim;
  const sx = Math.max(w * scale, 8);
  const sh = h * scale;
  const st = Math.max(t * scale, 2);
  const er = parseFloat(document.getElementById('tline-er')?.value) || 4.5;

  let parts = [];

  if (tlineStructure === 'stripline') {
    // Top ground
    parts.push(`<rect x="${margin.left}" y="${margin.top}" width="${plotW}" height="6" fill="var(--orange)" opacity="0.7"/>`);
    // Bottom ground
    parts.push(`<rect x="${margin.left}" y="${margin.top+plotH-6}" width="${plotW}" height="6" fill="var(--orange)" opacity="0.7"/>`);
    // Dielectric fill
    parts.push(`<rect x="${margin.left}" y="${margin.top+6}" width="${plotW}" height="${plotH-12}" fill="var(--bg-hover)" opacity="0.4"/>`);
    // Trace centered
    const traceY = margin.top + plotH/2 - st/2;
    parts.push(`<rect x="${margin.left+(plotW-sx)/2}" y="${traceY}" width="${sx}" height="${st}" fill="var(--cyan)" rx="1"/>`);
    // Labels
    parts.push(`<text x="${margin.left}" y="${margin.top-10}" fill="var(--orange)" font-size="11" font-family="sans-serif">⏚ GND</text>`);
    parts.push(`<text x="${margin.left}" y="${margin.top+plotH+25}" fill="var(--orange)" font-size="11" font-family="sans-serif">⏚ GND</text>`);
    parts.push(`<text x="${W/2}" y="${margin.top+plotH/2 - 10}" fill="var(--text-dim)" font-size="10" text-anchor="middle" font-family="sans-serif">H = ${h.toFixed(2)} mm</text>`);
    // Dimension lines
    parts.push(`<line x1="${margin.left+plotW-8}" y1="${margin.top+6}" x2="${margin.left+plotW-8}" y2="${margin.top+plotH/2}" stroke="var(--text-dim)" stroke-width="0.5" stroke-dasharray="3,2"/>`);
    parts.push(`<line x1="${margin.left+plotW-8}" y1="${margin.top+plotH/2}" x2="${margin.left+plotW-8}" y2="${margin.top+plotH-6}" stroke="var(--text-dim)" stroke-width="0.5" stroke-dasharray="3,2"/>`);
  } else {
    // Ground plane at bottom
    parts.push(`<rect x="${margin.left}" y="${margin.top+plotH-6}" width="${plotW}" height="6" fill="var(--orange)" opacity="0.7"/>`);
    // Dielectric
    const dielTop = margin.top + plotH - 6 - sh;
    parts.push(`<rect x="${margin.left}" y="${dielTop}" width="${plotW}" height="${sh}" fill="var(--bg-hover)" opacity="0.4"/>`);
    // Trace on top
    const traceX = margin.left + (plotW-sx)/2;
    parts.push(`<rect x="${traceX}" y="${dielTop-st}" width="${sx}" height="${st}" fill="var(--cyan)" rx="1"/>`);
    // Labels
    parts.push(`<text x="${margin.left}" y="${margin.top+plotH+25}" fill="var(--orange)" font-size="11" font-family="sans-serif">⏚ GND Plane</text>`);
    parts.push(`<text x="${W/2}" y="${dielTop-st-8}" fill="var(--text-dim)" font-size="10" text-anchor="middle" font-family="sans-serif">W = ${w.toFixed(2)} mm</text>`);
    parts.push(`<text x="${margin.left+plotW+6}" y="${dielTop+sh/2+3}" fill="var(--text-dim)" font-size="10" font-family="sans-serif">H = ${h.toFixed(2)}</text>`);
    // H dimension line
    parts.push(`<line x1="${margin.left+plotW-5}" y1="${dielTop}" x2="${margin.left+plotW-5}" y2="${margin.top+plotH-6}" stroke="var(--text-dim)" stroke-width="0.5" stroke-dasharray="3,2"/>`);
    // Differential pair
    if (tlineDifferential) {
      const ss = Math.max(s * scale, 4);
      const trace1X = margin.left + (plotW - 2*sx - ss)/2;
      const trace2X = trace1X + sx + ss;
      parts.push(`<rect x="${trace1X}" y="${dielTop-st}" width="${sx}" height="${st}" fill="var(--cyan)" rx="1"/>`);
      parts.push(`<rect x="${trace2X}" y="${dielTop-st}" width="${sx}" height="${st}" fill="var(--seafoam)" rx="1"/>`);
      const midX = trace1X + sx + ss/2;
      parts.push(`<text x="${midX}" y="${dielTop-st-8}" fill="var(--text-dim)" font-size="9" text-anchor="middle" font-family="sans-serif">S=${s.toFixed(2)}</text>`);
    }
  }

  // Er label in dielectric
  parts.push(`<text x="${W/2}" y="${margin.top+plotH/2+5}" fill="var(--text-dim)" font-size="14" text-anchor="middle" font-family="sans-serif" opacity="0.35">εᵣ = ${er.toFixed(2)}</text>`);

  svg.innerHTML = parts.join('');
}

function calcTLine() {
  const er = parseFloat(document.getElementById('tline-er')?.value) || 4.5;
  const w = parseFloat(document.getElementById('tline-w')?.value) || 3.0;
  const h = parseFloat(document.getElementById('tline-h')?.value) || 1.6;
  const t = parseFloat(document.getElementById('tline-t')?.value) || 0.035;
  const s = parseFloat(document.getElementById('tline-s')?.value) || 0.5;

  let result = tlineStructure === 'stripline'
    ? calcStripline(er, w, h, t)
    : calcMicrostrip(er, w, h, t);

  const { z0, eeff } = result;
  const c = 299.792458;
  const tpd = Math.sqrt(eeff) * 3.3356; // ps/mm
  const c0 = tpd / z0; // pF/mm
  const l0 = z0 * tpd / 1000; // nH/mm

  document.getElementById('tline-z0').textContent = z0.toFixed(1);
  document.getElementById('tline-eeff').textContent = eeff.toFixed(3);
  document.getElementById('tline-tpd').textContent = tpd.toFixed(2);
  document.getElementById('tline-c0').textContent = c0.toFixed(3);
  document.getElementById('tline-l0').textContent = l0.toFixed(2);

  // Match indicator
  const diff = Math.abs(z0 - tlineTargetZ) / tlineTargetZ * 100;
  let cls, text;
  if (Math.abs(z0 - tlineTargetZ) < 0.5) { cls = 'good'; text = '✓ DEAD ON'; }
  else if (diff < 5) { cls = 'good'; text = 'GOOD'; }
  else if (diff < 15) { cls = 'warn'; text = 'OK'; }
  else { cls = 'bad'; text = 'OFF'; }
  document.getElementById('tline-match').innerHTML = `<span class="badge ${cls}">${text}</span> ${diff.toFixed(1)}% off ${tlineTargetZ}Ω`;

  // Differential
  if (tlineDifferential && tlineStructure === 'microstrip') {
    const d = calcDiffMicrostrip(z0, s, h);
    document.getElementById('tline-zdiff').textContent = d.zdiff.toFixed(1);
    document.getElementById('tline-zodd').textContent = d.zodd.toFixed(1);
    document.getElementById('tline-zeven').textContent = d.zeven.toFixed(1);
    document.getElementById('tline-diff-results').style.display = 'grid';
  } else {
    document.getElementById('tline-diff-results').style.display = 'none';
  }

  drawTLineDiagram(w, h, t, s);
}

function initTLine() {
  document.querySelectorAll('.tline-structure-btn').forEach(btn => {
    btn.addEventListener('click', () => setTLineStructure(btn.dataset.type));
  });
  ['tline-er', 'tline-w', 'tline-h', 'tline-t', 'tline-s', 'tline-target'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', calcTLine);
  });
  const diffToggle = document.getElementById('tline-diff-toggle');
  if (diffToggle) diffToggle.addEventListener('change', toggleDifferential);
  calcTLine();
}

</script>
